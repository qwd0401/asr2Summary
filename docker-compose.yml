version: '3.8'

services:
  meetassistant:
    build: .
    container_name: meetassistant-app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-your-production-secret-key-here}
      - PORT=5000
    volumes:
      - ./uploads:/app/uploads
      - ./summaries:/app/summaries
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - meetassistant-network

  # Nginx反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: meetassistant-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - meetassistant
    restart: unless-stopped
    networks:
      - meetassistant-network

networks:
  meetassistant-network:
    driver: bridge

volumes:
  uploads:
  summaries:
  logs: