version: "3.8"

services:
  meetassistant:
    build: .
    container_name: meetassistant
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
      - PORT=5000
    volumes:
      - ./uploads:/app/uploads
      - ./summaries:/app/summaries
      - ./logs:/app/logs
      - ./meetassistant.db:/app/meetassistant.db
    restart: unless-stopped
