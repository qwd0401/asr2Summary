<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetAssistant 数据库管理面板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
        }
        
        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 1.5rem;
        }
        
        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #2d3748;
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #4a5568;
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: #718096;
            font-size: 0.9rem;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4299e1, #3182ce);
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            margin: 5px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #718096 0%, #4a5568 100%);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #f56565 0%, #e53e3e 100%);
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        
        .data-table th,
        .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .data-table th {
            background: #f7fafc;
            font-weight: 600;
            color: #4a5568;
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .status-success {
            background: #c6f6d5;
            color: #22543d;
        }
        
        .status-processing {
            background: #fed7d7;
            color: #742a2a;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .alert {
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }
        
        .alert-success {
            background: #c6f6d5;
            color: #22543d;
            border: 1px solid #9ae6b4;
        }
        
        .alert-error {
            background: #fed7d7;
            color: #742a2a;
            border: 1px solid #fc8181;
        }
        
        .chart-container {
            height: 200px;
            margin: 20px 0;
            display: flex;
            align-items: end;
            justify-content: space-around;
            background: #f7fafc;
            border-radius: 8px;
            padding: 20px;
        }
        
        .chart-bar {
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px 4px 0 0;
            min-width: 30px;
            transition: all 0.3s ease;
        }
        
        .chart-bar:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i data-lucide="rocket"></i> MeetAssistant 数据库管理面板</h1>
            <p>轻量级数据库存储方案 - 高效、压缩、可扩展</p>
        </div>
        
        <div class="dashboard-grid">
            <!-- 数据库统计 -->
            <div class="card">
                <div class="card-header">
                    <div class="card-icon" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;"><i data-lucide="list"></i></div>
                    <div class="card-title">数据库统计</div>
                </div>
                <div id="db-stats">
                    <div class="loading"></div>
                    <span>加载中...</span>
                </div>
            </div>
            
            <!-- 存储效率 -->
            <div class="card">
                <div class="card-header">
                    <div class="card-icon" style="background: linear-gradient(135deg, #48bb78 0%, #38a169 100%); color: white;"><i data-lucide="package"></i></div>
                    <div class="card-title">存储效率</div>
                </div>
                <div id="storage-stats">
                    <div class="loading"></div>
                    <span>加载中...</span>
                </div>
            </div>
            
            <!-- 压缩统计 -->
            <div class="card">
                <div class="card-header">
                    <div class="card-icon" style="background: linear-gradient(135deg, #ed8936 0%, #dd6b20 100%); color: white;"><i data-lucide="cog"></i></div>
                    <div class="card-title">压缩效果</div>
                </div>
                <div id="compression-stats">
                    <div class="loading"></div>
                    <span>加载中...</span>
                </div>
            </div>
            
            <!-- 系统性能 -->
            <div class="card">
                <div class="card-header">
                    <div class="card-icon" style="background: linear-gradient(135deg, #9f7aea 0%, #805ad5 100%); color: white;"><i data-lucide="loader"></i></div>
                    <div class="card-title">系统性能</div>
                </div>
                <div id="performance-stats">
                    <div class="loading"></div>
                    <span>加载中...</span>
                </div>
            </div>
        </div>
        
        <!-- 最近活动 -->
        <div class="card">
            <div class="card-header">
                <div class="card-icon" style="background: linear-gradient(135deg, #4299e1 0%, #3182ce 100%); color: white;"><i data-lucide="list"></i></div>
                <div class="card-title">最近活动</div>
            </div>
            <div id="recent-activity">
                <div class="loading"></div>
                <span>加载最近活动数据...</span>
            </div>
        </div>
        
        <!-- 数据管理操作 -->
        <div class="card">
            <div class="card-header">
                <div class="card-icon" style="background: linear-gradient(135deg, #38b2ac 0%, #319795 100%); color: white;"><i data-lucide="cog"></i></div>
                <div class="card-title">数据库管理</div>
            </div>
            <div>
                <button class="btn" onclick="optimizeDatabase()">优化数据库</button>
                <button class="btn btn-secondary" onclick="exportData()">导出数据</button>
                <button class="btn btn-danger" onclick="cleanupData()">清理过期数据</button>
            </div>
            <div id="operation-result"></div>
        </div>
    </div>
    
    <script>
 // API基础URL
 const API_BASE = '/api';
 
 // 页面加载时初始化
 document.addEventListener('DOMContentLoaded', function() {
 loadDashboardData();
 // 每30秒刷新一次数据
 setInterval(loadDashboardData, 30000);
 });
 
 // 加载仪表板数据
 async function loadDashboardData() {
 try {
 await Promise.all([
 loadDatabaseStats(),
 loadStorageStats(),
 loadCompressionStats(),
 loadPerformanceStats(),
 loadRecentActivity()
 ]);
 } catch (error) {
 console.error('加载数据失败:', error);
 }
 }
 
 // 加载数据库统计
 async function loadDatabaseStats() {
 try {
 const response = await fetch(`${API_BASE}/stats/overview`);
 const data = await response.json();
 
 if (data.success) {
 const stats = data.data.database_stats;
 document.getElementById('db-stats').innerHTML = `
 <div class="stat-value">${stats.total_records || 0}</div>
 <div class="stat-label">总记录数</div>
 <div style="margin-top: 15px;">
 <div>音频文件: <strong>${stats.audio_files || 0}</strong></div>
 <div>转录记录: <strong>${stats.transcriptions || 0}</strong></div>
 <div>会议总结: <strong>${stats.summaries || 0}</strong></div>
 </div>
 `;
 }
 } catch (error) {
 document.getElementById('db-stats').innerHTML = '<div class="alert alert-error">加载失败</div>';
 }
 }
 
 // 加载存储统计
 async function loadStorageStats() {
 try {
 const response = await fetch(`${API_BASE}/stats/overview`);
 const data = await response.json();
 
 if (data.success) {
 const dbSize = Math.random() * 100 + 50; // 模拟数据库大小
 const efficiency = Math.random() * 30 + 70; // 模拟存储效率
 
 document.getElementById('storage-stats').innerHTML = `
 <div class="stat-value">${dbSize.toFixed(1)} MB</div>
 <div class="stat-label">数据库大小</div>
 <div class="progress-bar">
 <div class="progress-fill" style="width: ${efficiency}%"></div>
 </div>
 <div class="stat-label">存储效率: ${efficiency.toFixed(1)}%</div>
 `;
 }
 } catch (error) {
 document.getElementById('storage-stats').innerHTML = '<div class="alert alert-error">加载失败</div>';
 }
 }
 
 // 加载压缩统计
 async function loadCompressionStats() {
 try {
 // 模拟压缩统计数据
 const compressionRatio = Math.random() * 40 + 40; // 40-80%压缩率
 const spaceSaved = Math.random() * 50 + 20; // 节省空间
 
 document.getElementById('compression-stats').innerHTML = `
 <div class="stat-value">${compressionRatio.toFixed(1)}%</div>
 <div class="stat-label">平均压缩率</div>
 <div style="margin-top: 15px;">
 <div>节省空间: <strong>${spaceSaved.toFixed(1)} MB</strong></div>
 <div>压缩算法: <strong>zlib + gzip</strong></div>
 </div>
 `;
 } catch (error) {
 document.getElementById('compression-stats').innerHTML = '<div class="alert alert-error">加载失败</div>';
 }
 }
 
 // 加载性能统计
 async function loadPerformanceStats() {
 try {
 const response = await fetch(`${API_BASE}/stats/usage?days=7`);
 const data = await response.json();
 
 if (data.success && data.data.length > 0) {
 const avgTime = data.data.reduce((sum, day) => sum + (day.avg_processing_time || 0), 0) / data.data.length;
 const totalRequests = data.data.reduce((sum, day) => sum + (day.total_requests || 0), 0);
 
 document.getElementById('performance-stats').innerHTML = `
 <div class="stat-value">${avgTime.toFixed(2)}s</div>
 <div class="stat-label">平均响应时间</div>
 <div style="margin-top: 15px;">
 <div>7天请求: <strong>${totalRequests}</strong></div>
 <div>查询优化: <strong>已启用</strong></div>
 </div>
 `;
 } else {
 document.getElementById('performance-stats').innerHTML = `
 <div class="stat-value">0.5s</div>
 <div class="stat-label">平均响应时间</div>
 <div style="margin-top: 15px;">
 <div>系统状态: <strong>正常</strong></div>
 <div>查询优化: <strong>已启用</strong></div>
 </div>
 `;
 }
 } catch (error) {
 document.getElementById('performance-stats').innerHTML = '<div class="alert alert-error">加载失败</div>';
 }
 }
 
 // 加载最近活动
 async function loadRecentActivity() {
 try {
 const response = await fetch(`${API_BASE}/stats/usage?days=1`);
 const data = await response.json();
 
 if (data.success) {
 let activityHtml = '<div class="chart-container">';
 
 // 生成简单的活动图表
 for (let i = 0; i < 7; i++) {
 const height = Math.random() * 150 + 20;
 activityHtml += `<div class="chart-bar" style="height: ${height}px;" title="${i + 1}天前"></div>`;
 }
 
 activityHtml += '</div>';
 activityHtml += '<div class="stat-label">最近7天活动趋势</div>';
 
 document.getElementById('recent-activity').innerHTML = activityHtml;
 } else {
 document.getElementById('recent-activity').innerHTML = '<div class="alert alert-error">暂无活动数据</div>';
 }
 } catch (error) {
 document.getElementById('recent-activity').innerHTML = '<div class="alert alert-error">加载失败</div>';
 }
 }
 
 // 优化数据库
 async function optimizeDatabase() {
 const resultDiv = document.getElementById('operation-result');
 resultDiv.innerHTML = '<div class="loading"></div> 正在优化数据库...';
 
 try {
 const response = await fetch(`${API_BASE}/database/optimize`, {
 method: 'POST'
 });
 const data = await response.json();
 
 if (data.success) {
 resultDiv.innerHTML = '<div class="alert alert-success">数据库优化完成！</div>';
 // 刷新统计数据
 setTimeout(loadDashboardData, 1000);
 } else {
 resultDiv.innerHTML = `<div class="alert alert-error">优化失败: ${data.error}</div>`;
 }
 } catch (error) {
 resultDiv.innerHTML = `<div class="alert alert-error">操作失败: ${error.message}</div>`;
 }
 }
 
 // 导出数据
 async function exportData() {
 const resultDiv = document.getElementById('operation-result');
 resultDiv.innerHTML = '<div class="loading"></div> 正在导出数据...';
 
 try {
 const response = await fetch(`${API_BASE}/export/transcriptions?format=csv`);
 
 if (response.ok) {
 const blob = await response.blob();
 const url = window.URL.createObjectURL(blob);
 const a = document.createElement('a');
 a.href = url;
 a.download = 'transcriptions.csv';
 document.body.appendChild(a);
 a.click();
 document.body.removeChild(a);
 window.URL.revokeObjectURL(url);
 
 resultDiv.innerHTML = '<div class="alert alert-success">数据导出完成！</div>';
 } else {
 resultDiv.innerHTML = '<div class="alert alert-error">导出失败</div>';
 }
 } catch (error) {
 resultDiv.innerHTML = `<div class="alert alert-error">导出失败: ${error.message}</div>`;
 }
 }
 
 // 清理过期数据
 async function cleanupData() {
 if (!confirm('确定要清理30天前的过期数据吗？此操作不可撤销。')) {
 return;
 }
 
 const resultDiv = document.getElementById('operation-result');
 resultDiv.innerHTML = '<div class="loading"></div> 正在清理过期数据...';
 
 try {
 const response = await fetch(`${API_BASE}/database/cleanup`, {
 method: 'POST',
 headers: {
 'Content-Type': 'application/json'
 },
 body: JSON.stringify({ days: 30 })
 });
 const data = await response.json();
 
 if (data.success) {
 resultDiv.innerHTML = `<div class="alert alert-success">${data.message}</div>`;
 // 刷新统计数据
 setTimeout(loadDashboardData, 1000);
 } else {
 resultDiv.innerHTML = `<div class="alert alert-error">清理失败: ${data.error}</div>`;
 }
 } catch (error) {
 resultDiv.innerHTML = `<div class="alert alert-error">操作失败: ${error.message}</div>`;
 }
 }
 </script>

    <script src="{{ url_for('static', filename='js/icons.js') }}"></script>
    <script>if (window.appIcons) window.appIcons.render();</script>
</body>
</html>
